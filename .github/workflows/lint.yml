name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # lint.sh hard-fails in CI when shellcheck or jq is missing (it only
      # skips them locally), so install them explicitly instead of trusting
      # the runner image to keep shipping them (ALPA-366).
      - name: Install lint dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck jq
          pip install pyyaml

      - name: Run lint
        run: ./scripts/lint.sh
        env:
          CI: "true"
